version: "3.9"
# ============================================================
#  ABC Nepal TV — One-Click Local WordPress Environment
#  Compatible: WordPress 6.x, PHP 8.2, MySQL 8.0
#
#  Usage:
#    docker compose up -d
#
#  Access:
#    WordPress  → http://localhost:8080
#    phpMyAdmin → http://localhost:8081
#    WP Admin   → http://localhost:8080/wp-admin
#                 user: admin  |  pass: admin123
#
#  First run takes ~60s for DB init + WP setup.
#  Auto-setup runs via setup/setup.sh on first boot.
# ============================================================

services:
  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: abc_nepal_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: abc_nepal_wp
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - abc_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── WordPress (PHP 8.2 + Apache) ───────────────────────────
  wordpress:
    image: wordpress:6.5-php8.2-apache
    container_name: abc_nepal_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: abc_nepal_wp
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_TABLE_PREFIX: wp_
      # Debug logging on, but NOT displayed on screen (fixes header warnings)
      # Fixed site URL — prevents broken CSS/images when accessing via LAN IP
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('AUTOMATIC_UPDATER_DISABLED', true);
        define('WP_AUTO_UPDATE_CORE', false);
        define('DISABLE_WP_CRON', true);
        define('WP_HOME', 'http://abctv.local:8080');
        define('WP_SITEURL', 'http://abctv.local:8080');
    volumes:
      # Mount entire theme folder
      - ./theme:/var/www/html/wp-content/themes/abctvnepal
      # Persist WP core + uploads across restarts
      - wp_data:/var/www/html
      # Auto-setup script
      - ./setup:/setup
    ports:
      - "8080:80"
    networks:
      - abc_net

  # ── phpMyAdmin (optional DB GUI) ───────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: abc_nepal_pma
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: wp_user
      PMA_PASSWORD: wp_password
    ports:
      - "8081:80"
    networks:
      - abc_net

volumes:
  db_data:
  wp_data:

networks:
  abc_net:
    driver: bridge